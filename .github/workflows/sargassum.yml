name: Cam Vision Feed

# Reads seaweed (sargassum) + crowd from the beach cams with Gemini vision and
# publishes cam_seaweed.json to the `sargassum-data` branch (NOT main), so the
# AI calls run here on free public-repo Actions and never touch Netlify.

on:
  schedule:
    # Capture through the day (~7 AM-7 PM ET) to build the busyness-by-hour
    # pattern; the ~7 AM run also captures seaweed BEFORE the City's
    # beach-cleaning tractor (~7-9 AM), which is weighted highest.
    - cron: "0 11,13,15,17,19,21,23 * * *" # ~7 AM,9,11,1 PM,3,5,7 ET
  push:
    branches: [main]
    paths:
      - ".github/workflows/sargassum.yml"
      - "scripts/cam_seaweed.py"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: sargassum
  cancel-in-progress: true

jobs:
  build-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read seaweed + crowd from beach cams (Gemini free tier)
        run: python scripts/cam_seaweed.py # no-op without GEMINI_API_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CAM_SEAWEED_OUT: ${{ runner.temp }}/cam_seaweed.json

      - name: Publish to sargassum-data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          work="${{ runner.temp }}/pub"
          mkdir -p "$work"
          cp "${{ runner.temp }}/cam_seaweed.json" "$work/cam_seaweed.json"
          cd "$work"
          git init -q
          git config user.name "cam-vision-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b sargassum-data
          git add -A
          git commit -q -m "Cam vision feed $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" sargassum-data
