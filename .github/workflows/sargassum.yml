name: Cam Vision Feed

# Reads seaweed (sargassum) + crowd from the beach cams with Gemini vision and
# publishes cam_seaweed.json to the `sargassum-data` branch (NOT main), so the
# AI calls run here on free public-repo Actions and never touch Netlify.

on:
  schedule:
    # Capture through the day (~7 AM-7 PM ET) to build the busyness-by-hour
    # pattern; the ~7 AM run also captures seaweed BEFORE the City's
    # beach-cleaning tractor (~7-9 AM), which is weighted highest.
    # Extra 10 & 12 UTC ticks (~6 & 8 AM ET) add redundancy in the pre-tractor
    # morning window — GitHub skips/delays scheduled ticks routinely, and a day
    # with no morning capture loses its authoritative seaweed read.
    - cron: "0 10,11,12,13,15,17,19,21,23 * * *" # ~6,7,8,9,11 AM,1 PM,3,5,7 ET
  push:
    branches: [main]
    paths:
      - ".github/workflows/sargassum.yml"
      - "scripts/cam_seaweed.py"
  workflow_dispatch: {}

permissions:
  contents: write
  models: read # lets the job's GITHUB_TOKEN call GitHub Models (free vision fallback)

concurrency:
  group: sargassum
  cancel-in-progress: true

jobs:
  build-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 12  # headroom for per-cam spacing + retry backoff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read seaweed + crowd from beach cams (free vision, with fallback)
        # Falls through providers in order until one answers; no-op if none configured.
        run: python scripts/cam_seaweed.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} # optional free fallback (14.4k/day)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} # optional free fallback
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub Models fallback (no signup)
          CAM_SEAWEED_OUT: ${{ runner.temp }}/cam_seaweed.json

      - name: Publish to sargassum-data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          feed="${{ runner.temp }}/cam_seaweed.json"
          if [ ! -f "$feed" ]; then
            echo "no feed written (no fresh readings and no prior good data) — leaving last good sargassum-data in place"
            exit 0
          fi
          work="${{ runner.temp }}/pub"
          mkdir -p "$work"
          cp "$feed" "$work/cam_seaweed.json"
          cd "$work"
          git init -q
          git config user.name "cam-vision-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b sargassum-data
          git add -A
          git commit -q -m "Cam vision feed $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" sargassum-data
