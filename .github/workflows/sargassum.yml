name: Cam Vision Feed

# Reads seaweed (sargassum) + crowd from the beach cams with Gemini vision and
# publishes cam_seaweed.json to the `sargassum-data` branch (NOT main), so the
# AI calls run here on free public-repo Actions and never touch Netlify.
# Also, at most once per hour during daylight, grabs a frame from the Deerfield
# underwater sea-cam (yt-dlp -> ffmpeg) for a separate visibility read that
# ground-truths the surface water-clarity grades (fully fail-soft — see script).

on:
  schedule:
    # Every 10 minutes through daylight (~6 AM-8 PM ET). Budget: 3 cams/tick ×
    # ~84 scheduled ticks = ~252 vision calls/day, right at Gemini's 250/day
    # free cap — but GitHub skips ~30% of scheduled ticks, and any Gemini 429
    # falls through to the Groq/GitHub-Models fallbacks, so real usage fits.
    # Dense morning coverage also captures seaweed BEFORE the City's
    # beach-cleaning tractor (~7-9 AM), which is weighted highest.
    - cron: "*/10 10-23 * * *" # every 10 min, ~6 AM-7:50 PM ET (EDT)
  push:
    branches: [main]
    paths:
      - ".github/workflows/sargassum.yml"
      - "scripts/cam_seaweed.py"
  workflow_dispatch: {}

permissions:
  contents: write
  models: read # lets the job's GITHUB_TOKEN call GitHub Models (free vision fallback)

concurrency:
  group: sargassum
  cancel-in-progress: true

jobs:
  build-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 12  # headroom for per-cam spacing + retry backoff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yt-dlp (underwater sea-cam frame grab)
        # yt-dlp resolves the Deerfield underwater YouTube livestream to an HLS
        # URL that ffmpeg (preinstalled on ubuntu-latest, as is node — the JS
        # runtime yt-dlp needs) frame-grabs. `|| true` keeps the job resilient:
        # the script fail-softs if yt-dlp is missing, so a failed install must
        # never fail the workflow — we just accrue no underwater readings.
        run: pip install --quiet yt-dlp || true

      - name: Read seaweed + crowd from beach cams (free vision, with fallback)
        # Falls through providers in order until one answers; no-op if none configured.
        run: python scripts/cam_seaweed.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} # optional free fallback (14.4k/day)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }} # optional free fallback
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub Models fallback (no signup)
          CAM_SEAWEED_OUT: ${{ runner.temp }}/cam_seaweed.json

      - name: Publish to sargassum-data branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          feed="${{ runner.temp }}/cam_seaweed.json"
          if [ ! -f "$feed" ]; then
            echo "no feed written (no fresh readings and no prior good data) — leaving last good sargassum-data in place"
            exit 0
          fi
          work="${{ runner.temp }}/pub"
          mkdir -p "$work"
          cp "$feed" "$work/cam_seaweed.json"
          cd "$work"
          git init -q
          git config user.name "cam-vision-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b sargassum-data
          git add -A
          git commit -q -m "Cam vision feed $(date -u +%FT%TZ)"
          git push -f "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" sargassum-data
