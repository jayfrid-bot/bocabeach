name: Vision Eval

# Three jobs in one:
#  - on a schedule: collect fresh cam photos (all views, every 2 h during daylight),
#    run the production vision model on new ones, and rebuild the review.
#  - when you edit eval/labels.csv (your answers): just re-grade — no model calls.
#  - workflow_dispatch with backfill=true: one-shot grab of ALL live views right now.
# Everything is committed back to main so you review/correct it on GitHub.

on:
  schedule:
    # Every 2 hours 7 AM–9 PM ET (11:00–01:00 UTC); covers full Boca daylight.
    - cron: "0 11,13,15,17,19,21,23,1 * * *"
  push:
    branches: [main]
    paths: ["eval/labels.csv"]
  workflow_dispatch:
    inputs:
      backfill:
        description: "Backfill: grab all live views right now (ignores cap)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: eval
  cancel-in-progress: false

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Backfill — grab ALL live cam views right now (manual trigger only)
        if: github.event_name == 'workflow_dispatch' && inputs.backfill == 'true'
        run: python eval/backfill_stills.py

      - name: Collect fresh cam photos (scheduled, not labels edit, not backfill)
        if: >
          github.event_name != 'push' &&
          !(github.event_name == 'workflow_dispatch' && inputs.backfill == 'true')
        run: python eval/archive_stills.py
        env:
          EVAL_MAX_IMAGES: "300"  # ~300 images keeps the repo manageable

      - name: Run the production vision model on new photos (not on a labels edit)
        if: github.event_name != 'push'
        run: python eval/run_eval.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EVAL_DELAY: "7"

      - name: Rebuild the review page + grade
        run: |
          python eval/make_review.py
          python eval/score_eval.py || true

      - name: Commit eval updates
        run: |
          git config user.name "eval-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eval
          if git diff --cached --quiet; then
            echo "nothing changed"
          else
            git commit -m "eval: refresh $(date -u +%FT%TZ)"
            git push
          fi
